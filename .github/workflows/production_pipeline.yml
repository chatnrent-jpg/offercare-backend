name: VettedMe.ai Production CI Pipeline

on:
  push:
    branches: [ main, production ]
  pull_request:
    branches: [ main ]

jobs:
  verify-and-stage:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "@Prowess247"
          POSTGRES_DB: offercare_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Set up Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Enterprise Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Baseline Test Matrix
      env:
        PYTHONPATH: .
        DATABASE_URL: postgresql://postgres:%40Prowess247@localhost:5432/offercare_db
      run: |
        python -m pytest tests/test_production_telemetry.py
        python -m pytest tests/test_scale_enhancements.py
        python -m pytest tests/test_b2b_invoicing_engine.py
        python -m pytest tests/test_api_billing.py

    - name: Execute Production Pre-Flight Smoke Test
      env:
        PYTHONPATH: .
      run: |
        python scripts/production_smoke_test.py
