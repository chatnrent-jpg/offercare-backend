version: '3.8'

services:
  vettedme-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vettedme-backend-prod
    restart: always
    ports:
      - "8503:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:%40Prowess247@vettedme-db:5432/offercare_db
      - PYTHONPATH=/app
    depends_on:
      - vettedme-db
    networks:
      - vettedme-network

  vettedme-db:
    image: postgres:15-alpine
    container_name: vettedme-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=@Prowess247
      - POSTGRES_DB=offercare_db
    volumes:
      - vettedme-db-data:/var/lib/postgresql/data
    networks:
      - vettedme-network

volumes:
  vettedme-db-data:

networks:
  vettedme-network:
    driver: bridge
