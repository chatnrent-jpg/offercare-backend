<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation - VettedMe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b1220;
            --panel: #121a2b;
            --panel-border: #243049;
            --text: #e8eef8;
            --muted: #93a4c3;
            --accent: #2dd4bf;
            --accent-dim: #0f766e;
        }
        body { 
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #12203a, var(--bg) 45%);
            color: var(--text);
            min-height: 100vh;
            margin: 0;
        }
        .gradient-bg { 
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
        }
        .card-panel {
            background: rgba(18, 26, 43, 0.92);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        }
        nav {
            background: rgba(18, 26, 43, 0.92);
            border-bottom: 1px solid var(--panel-border);
        }
        .nav-link { color: var(--muted); }
        .nav-link:hover { color: var(--text); }
        .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }
        .doc-link { 
            color: var(--muted); 
            transition: all 0.2s; 
        }
        .doc-link:hover, .doc-link.active { 
            background: rgba(45, 212, 191, 0.1); 
            color: var(--accent); 
        }
        .markdown-content {
            line-height: 1.7;
        }
        .markdown-content h1 { 
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text);
        }
        .markdown-content h2 { 
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            margin-top: 1.5rem;
            color: var(--text);
        }
        .markdown-content h3 { 
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            margin-top: 1rem;
            color: var(--muted);
        }
        .markdown-content p { 
            margin-bottom: 1rem;
            color: var(--muted);
        }
        .markdown-content ul, .markdown-content ol { 
            margin-left: 1.5rem;
            margin-bottom: 1rem;
            color: var(--muted);
        }
        .markdown-content li {
            margin-bottom: 0.5rem;
        }
        .markdown-content code { 
            background: #0a101c;
            padding: 0.125rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.875rem;
            font-family: 'Courier New', monospace;
            color: var(--accent);
        }
        .markdown-content pre { 
            background: #0a101c;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            overflow-x: auto;
            border: 1px solid var(--panel-border);
        }
        .markdown-content pre code { 
            background: transparent;
            padding: 0;
            color: var(--text);
        }
        .markdown-content blockquote { 
            border-left: 4px solid var(--accent);
            padding-left: 1rem;
            font-style: italic;
            color: var(--muted);
            margin-bottom: 1rem;
        }
        .markdown-content a { 
            color: var(--accent);
            text-decoration: underline;
        }
        .markdown-content a:hover { 
            color: #34e4cd;
        }
        .markdown-content table { 
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }
        .markdown-content th { 
            background: rgba(45, 212, 191, 0.1);
            border: 1px solid var(--panel-border);
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text);
        }
        .markdown-content td { 
            border: 1px solid var(--panel-border);
            padding: 0.75rem 1rem;
            color: var(--muted);
        }
        .markdown-content strong {
            color: var(--text);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex-shrink-0 flex items-center">
                        <h1 class="text-2xl font-bold gradient-bg bg-clip-text text-transparent">VettedMe</h1>
                    </a>
                    <div class="hidden sm:ml-8 sm:flex sm:space-x-8">
                        <a href="/" class="nav-link border-b-2 border-transparent inline-flex items-center px-1 pt-1 text-sm font-medium">Home</a>
                        <a href="/dashboard" class="nav-link border-b-2 border-transparent inline-flex items-center px-1 pt-1 text-sm font-medium">Dashboard</a>
                        <a href="/api-docs" class="nav-link border-b-2 border-transparent inline-flex items-center px-1 pt-1 text-sm font-medium">API Docs</a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/help" class="nav-link text-sm font-medium">Help</a>
                    <a href="/account" class="nav-link px-4 py-2 rounded-lg text-sm font-medium" style="background: rgba(45, 212, 191, 0.1); border: 1px solid var(--panel-border);">
                        Account
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex space-x-8">
            <!-- Sidebar -->
            <div class="w-64 flex-shrink-0">
                <div class="card-panel p-6 sticky top-8">
                    <h2 class="text-lg font-semibold mb-4">Documentation</h2>
                    <nav class="space-y-2">
                        <a href="?doc=architecture" class="doc-link block px-3 py-2 text-sm font-medium rounded-lg">
                            🏗️ Architecture
                        </a>
                        <a href="?doc=security" class="doc-link block px-3 py-2 text-sm font-medium rounded-lg">
                            🔒 Security & Compliance
                        </a>
                        <a href="?doc=deployment" class="doc-link block px-3 py-2 text-sm font-medium rounded-lg">
                            🚀 Deployment Guide
                        </a>
                        <a href="?doc=sales" class="doc-link block px-3 py-2 text-sm font-medium rounded-lg">
                            📈 Sales Materials
                        </a>
                    </nav>
                </div>
            </div>

            <!-- Content -->
            <div class="flex-1">
                <div class="card-panel p-8">
                    <div id="content" class="markdown-content">
                        <h1>Welcome to VettedMe Documentation</h1>
                        <p>Select a document from the sidebar to view its contents.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const docMap = {
            'architecture': '/docs/architecture',
            'security': '/docs/security',
            'deployment': '/docs/deployment',
            'sales': '/docs/sales'
        };

        async function loadDoc() {
            const params = new URLSearchParams(window.location.search);
            const docName = params.get('doc');
            
            // Update active link
            document.querySelectorAll('.doc-link').forEach(link => {
                link.classList.remove('active');
            });
            
            if (docName && docMap[docName]) {
                try {
                    const response = await fetch(docMap[docName]);
                    const markdown = await response.text();
                    document.getElementById('content').innerHTML = marked.parse(markdown);
                    
                    // Mark active link
                    const activeLink = document.querySelector(`a[href="?doc=${docName}"]`);
                    if (activeLink) {
                        activeLink.classList.add('active');
                    }
                } catch (error) {
                    document.getElementById('content').innerHTML = `
                        <h1>Error Loading Document</h1>
                        <p style="color: #f87171;">Failed to load ${docName}: ${error.message}</p>
                    `;
                }
            }
        }

        loadDoc();
    </script>
</body>
</html>
