version: '3.8'

services:
  vettedme-backend-prod:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: vettedme-backend-hardened-prod
    restart: always
    ports:
      - "8503:8000"
    env_file:
      - .env.production
    read_only: true # Enforces a completely read-only root file system for maximum security protection
    tmpfs:
      - /tmp # Provides a secure, temporary memory storage area away from physical disk layers
    security_opt:
      - no-new-privileges:true # Blocks processes inside the container from gaining elevated access permissions
    depends_on:
      - vettedme-db-prod
      - vettedme-cache-prod
    networks:
      - vettedme-prod-secure-network

  vettedme-cache-prod:
    image: redis:7-alpine
    container_name: vettedme-cache-secure-prod
    command: redis-server --requirepass @Prowess247 --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: always
    security_opt:
      - no-new-privileges:true
    networks:
      - vettedme-prod-secure-network

  vettedme-db-prod:
    image: postgres:15-alpine
    container_name: vettedme-db-secure-prod
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=@Prowess247
      - POSTGRES_DB=offercare_db
    volumes:
      - vettedme-prod-db-data:/var/lib/postgresql/data
    networks:
      - vettedme-prod-secure-network

volumes:
  vettedme-prod-db-data:

networks:
  vettedme-prod-secure-network:
    driver: bridge
